name: Run Tracker Job Engine

on:
  schedule:
    - cron: '*/30 * * * *'  # Automatically invokes engine execution cycles every 30 minutes
  workflow_dispatch:      # Grants visual manual entry execution buttons inside GitHub UI

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository Base
        uses: actions/checkout@v4

      - name: Initialize Isolated Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Core Dependencies Extraction
        run: pip install httpx

      - name: Set Public DNS Resolvers
        run: |
          # 1. Break the symlink to systemd-resolved to gain direct file control
          sudo rm -f /etc/resolv.conf
          
          # 2. Force append high-throughput public engines directly to the resolution stack
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          echo "nameserver 1.1.1.1" | sudo tee -a /etc/resolv.conf
          
          # 3. Verify the resolution engine bypasses the local cache loop
          cat /etc/resolv.conf
          nslookup walmart.wd5.myworkdayjobs.com

      - name: Fire Execution Scraper Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STALE_SCAN_HOURS: 24
        run: python scraper_engine.py
